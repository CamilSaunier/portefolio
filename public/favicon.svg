<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1" />
      <stop offset="1" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- carré arrondi, dégradé accent -->
  <rect width="64" height="64" rx="15" fill="url(#bg)" />

  <!-- initiales encadrées d'accolades : { CS } facon bloc de code -->
  <text x="31" y="34" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800"
        letter-spacing="-1">
    <tspan fill="#ffffff" opacity="0.5">{</tspan><tspan fill="#ffffff">CS</tspan><tspan fill="#ffffff" opacity="0.5">}</tspan>
  </text>

  <!-- pastille "en ligne / noeud actif" : reprend le motif du Hero -->
  <circle cx="51" cy="14" r="6" fill="#22c55e" stroke="url(#bg)" stroke-width="3" />
</svg>
