      content="Portfolio de Camil Saunier — Développeur Full Stack (React, Node.js). Reconverti, ex-télécoms. Projets, parcours et compétences."
    />
    <!-- Évite le flash de thème : on applique data-theme avant le rendu de React -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved || (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Camil Saunier — Développeur Full Stack</title>
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
