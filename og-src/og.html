<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }

      body {
        position: relative;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: #0c0c0f;
        color: #f4f4f5;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px;
      }

      /* taches floues facon "lampe a lave" du site */
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.55;
      }
      .blob1 { width: 520px; height: 520px; left: -80px; bottom: -160px; background: #6366f1; }
      .blob2 { width: 460px; height: 460px; right: -60px; top: -160px; background: #8b5cf6; }
      .blob3 { width: 360px; height: 360px; right: 240px; bottom: -180px; background: #22d3ee; opacity: 0.4; }

      .content { position: relative; z-index: 1; }

      /* monogramme { CS } facon favicon */
      .mark {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -1px;
        padding: 12px 22px;
        border-radius: 16px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        margin-bottom: 44px;
      }
      .mark .brace { opacity: 0.55; }

      .name {
        font-size: 92px;
        font-weight: 800;
        letter-spacing: -3px;
        line-height: 1;
        margin-bottom: 18px;
      }

      .role {
        font-size: 40px;
        font-weight: 600;
        color: #a5b4fc;
        margin-bottom: 40px;
      }

      .stack {
        font-size: 27px;
        color: #a1a1aa;
        font-family: "Consolas", "SF Mono", monospace;
      }

      /* badge de statut, point vert "en ligne" */
      .status {
        position: absolute;
        z-index: 1;
        bottom: 80px;
        right: 80px;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: 26px;
        font-weight: 600;
        color: #f4f4f5;
        padding: 14px 26px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.25);
      }
    </style>
  </head>
  <body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="content">
      <div class="mark">
        <span class="brace">{</span>&nbsp;CS&nbsp;<span class="brace">}</span>
      </div>
      <div class="name">Camil Saunier</div>
      <div class="role">Full Stack Developer</div>
      <div class="stack">React · Node.js · TypeScript · PostgreSQL</div>
    </div>

    <div class="status">
      <span class="dot"></span>
      Open to hiring
    </div>
  </body>
</html>
