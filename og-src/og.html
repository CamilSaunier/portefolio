<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }

      body {
        position: relative;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: #0c0c0f;
        color: #f4f4f5;
      }

      /* lava bi-thème : indigo (froid) + ambre (chaud) + violet */
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.6;
      }
      .blob1 { width: 540px; height: 540px; left: -90px; top: -150px; background: #6366f1; }
      .blob2 { width: 520px; height: 520px; right: -100px; bottom: -180px; background: #fb923c; }
      .blob3 { width: 400px; height: 400px; left: 35%; bottom: -200px; background: #8b5cf6; opacity: 0.5; }

      /* panneau verre dépoli (signature liquid glass du site) */
      .panel {
        position: absolute;
        inset: 44px;
        border-radius: 28px;
        padding: 70px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(40px) saturate(150%);
        -webkit-backdrop-filter: blur(40px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.22);
      }

      /* monogramme { CS } : dégradé bi-thème indigo -> ambre */
      .mark {
        align-self: flex-start;
        display: inline-flex;
        align-items: center;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -1px;
        padding: 12px 22px;
        border-radius: 16px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6 55%, #fb923c);
        margin-bottom: 40px;
      }
      .mark .brace { opacity: 0.55; }

      .name {
        font-size: 92px;
        font-weight: 800;
        letter-spacing: -3px;
        line-height: 1;
        margin-bottom: 18px;
      }

      .role {
        font-size: 40px;
        font-weight: 600;
        color: #fdba74; /* ambre clair = accent du thème sombre */
        margin-bottom: 38px;
      }

      .stack {
        font-size: 26px;
        color: #c7c7cf;
        font-family: "Consolas", "SF Mono", monospace;
      }
    </style>
  </head>
  <body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="panel">
      <div class="mark"><span class="brace">{</span>&nbsp;CS&nbsp;<span class="brace">}</span></div>
      <div class="name">Camil Saunier</div>
      <div class="role">Full Stack Developer</div>
      <div class="stack">React · Node.js · TypeScript · PostgreSQL</div>
    </div>
  </body>
</html>
